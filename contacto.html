<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #d1d8e0;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .contacto-box {
            background: white;
            border: 2px solid black;
            width: 350px;
            padding: 0;
            overflow: hidden;
        }

        .barra-superior {
            background: black;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .contenido-contacto {
            padding: 30px;
            text-align: center;
        }

        .contenido-contacto img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid black;
            margin-bottom: 15px;
        }

        .email {
            font-weight: bold;
            background: #ffffcc; /* Efecto resaltador */
            padding: 5px;
        }

        .links-nav {
            margin-top: 20px;
            border-top: 1px dashed black;
            padding-top: 15px;
        }

        .links-nav a {
            text-decoration: none;
            color: blue;
            font-size: 14px;
            margin: 0 10px;
        }

        .links-nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="contacto-box">
        <div class="barra-superior">
            <span>contacto.exe</span>
            <span>[X]</span>
        </div>
        <div class="contenido-contacto">
            <img src="contact.jpeg" alt="Contacto">
            <p>¿Tienes dudas?</p>
            <p class="email">4ndreloy00@gmail.com</p>
            
            <div class="links-nav">
                <a href="index.html">Inicio</a>
                <a href="obras.html">Obras</a>
            </div>
        </div>
    </div>

</body>
</html>
