<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Digital Media - Inicio</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0e5ec;
            font-family: 'Courier New', Courier, monospace;
        }

        .ventana-principal {
            background-color: white;
            border: 2px solid #333;
            box-shadow: 8px 8px 0px #adb5bd;
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #2d3436;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .perfil-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding: 10px 20px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .nav-links a:hover {
            background-color: #333;
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="ventana-principal">
        <h1>DIGITAL MEDIA</h1>
        <img src="img/inicio.jpg" alt="Inicio" class="perfil-img">
        
        <div class="nav-links">
            <a href="obras.html">OBRAS</a>
            <a href="contacto.html">CONTACTO</a>
        </div>
    </div>

</body>
</html>
